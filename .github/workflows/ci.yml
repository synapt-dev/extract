name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install pytest

      - run: pytest tests/python/ -v

  build-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - run: pip install build

      - run: rm -rf src/synapt_extract/prompts && test -d ../../prompts && cp -r ../../prompts src/synapt_extract/prompts || true

      - run: python -m build

  check-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - run: npm ci

      - run: npx tsc --noEmit

  test-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - run: npm ci

      - run: npx vitest run

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify npm pack determinism
        working-directory: packages/ts
        run: |
          npm ci
          npm run build
          mkdir -p /tmp/npm-pack-1 /tmp/npm-pack-2
          npm pack --pack-destination /tmp/npm-pack-1
          npm pack --pack-destination /tmp/npm-pack-2
          echo "=== Pack 1 ==="
          sha256sum /tmp/npm-pack-1/*.tgz
          echo "=== Pack 2 ==="
          sha256sum /tmp/npm-pack-2/*.tgz
          HASH1=$(sha256sum /tmp/npm-pack-1/*.tgz | cut -d' ' -f1)
          HASH2=$(sha256sum /tmp/npm-pack-2/*.tgz | cut -d' ' -f1)
          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::npm pack is not deterministic"
            exit 1
          fi
          echo "npm pack determinism verified: $HASH1"

      - name: Verify Python build determinism
        working-directory: packages/python
        env:
          SOURCE_DATE_EPOCH: "1704067200"
        run: |
          pip install build
          rm -rf src/synapt_extract/prompts && test -d ../../prompts && cp -r ../../prompts src/synapt_extract/prompts || true
          python -m build --outdir /tmp/py-dist-1
          python -m build --outdir /tmp/py-dist-2
          echo "=== Build 1 ==="
          sha256sum /tmp/py-dist-1/*
          echo "=== Build 2 ==="
          sha256sum /tmp/py-dist-2/*
          for f in /tmp/py-dist-1/*; do
            basename=$(basename "$f")
            HASH1=$(sha256sum "$f" | cut -d' ' -f1)
            HASH2=$(sha256sum "/tmp/py-dist-2/$basename" | cut -d' ' -f1)
            if [ "$HASH1" != "$HASH2" ]; then
              echo "::error::Python build is not deterministic for $basename"
              exit 1
            fi
            echo "Python build determinism verified for $basename: $HASH1"
          done
