name: Bug Report
description: Report a bug in schema validation, finalization, or prompt generation
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@synapt-dev/extract (npm)"
        - "synapt-extract (PyPI)"
        - "JSON Schema"
        - "Prompt system"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.3.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or extraction document that triggers the bug.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Runtime (Node, Deno, Python), version, and OS."
      placeholder: "Node 22.0.0, macOS 15.1"
